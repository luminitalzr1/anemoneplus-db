    <script>
      document.addEventListener('keydown', function(e) {
        if (e.target.matches('input[placeholder*="Search"]')) {
          setTimeout(function() {
            var found = document.querySelector('input[placeholder*="Search"]');
            if (found && document.activeElement !== found) {
              found.focus();
              found.setSelectionRange(found.value.length, found.value.length);
            }
          }, 50);
        }
      }, true);
    </script>
